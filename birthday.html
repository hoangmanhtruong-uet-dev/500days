<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kỉ Niệm 500 Days</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600;700&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="birthday.css" />
</head>

<body>
  <canvas id="birthday-particles"></canvas>
  <a href="journey.html" class="back-btn">← Trở lại</a>

  <main class="birthday-scene">
    <section class="birthday-content">
      <div class="copy-block">
        <p class="eyebrow">Athune &amp; MtruongDayy</p>
        <h1>Kỉ niệm 500 days</h1>
        <p class="lead">Một khoảnh khắc nhỏ để giữ lại ngày thật đẹp của chúng ta.</p>
      </div>

      <div class="stage-shell">
        <button class="cake-stage" id="blow-candles" type="button" aria-label="Thổi nến">
          <span class="stage-light"></span>
          <span class="cake">
            <span class="candles"><i></i><i></i><i></i><i></i><i></i></span>
            <span class="cake-top"></span>
            <span class="cake-body"><b>500</b></span>
            <span class="cake-plate"></span>
          </span>
        </button>
      </div>

      <p class="birthday-note" id="birthday-note">Sẵn sàng gửi một điều ước thật đẹp.</p>
      <p class="wish-line">Phía sau ánh nến là một món quà nhỏ.</p>
    </section>
  </main>

  <script src="birthday.js"></script>
</body>

</html>
