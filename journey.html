<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hành Trình Của Chúng Ta 💕</title>
  <meta name="description" content="Hành trình tình yêu của Athune & MtruongDayy — 500 ngày hạnh phúc và những kỷ niệm đáng nhớ." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Dancing+Script:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="journey.css" />
</head>

<body>
  <!-- Particles Canvas -->
  <canvas id="journey-particles"></canvas>

  <!-- Ambient Background -->
  <div class="ambient-bg"></div>

  <!-- Floating Hearts Container -->
  <div class="floating-hearts"></div>

  <!-- Background Music Player -->
  <audio id="bg-music" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
  </audio>

  <!-- Music Control Button -->
  <button class="music-control" id="music-control" type="button" aria-label="Tắt/Bật nhạc">
    <svg class="music-icon music-icon--playing" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
    </svg>
    <svg class="music-icon music-icon--paused" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" opacity="0.3" />
    </svg>
    <div class="music-waves">
      <div class="music-wave"></div>
      <div class="music-wave"></div>
      <div class="music-wave"></div>
    </div>
  </button>

  <!-- Top Bar -->
  <header class="top-bar">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Trở về
    </a>
    <span class="brand-text">♥ Hành Trình Yêu</span>
    <div class="slide-counter" id="slide-counter">
      <span class="slide-counter-current">1</span>
      <span class="slide-counter-divider">/</span>
      <span class="slide-counter-total">7</span>
    </div>
  </header>

  <!-- Slides Container -->
  <div class="slides-wrapper" id="slides-wrapper"></div>

  <!-- Keyboard Hint -->
  <div class="keyboard-hint" id="keyboard-hint">
    <span class="key-hint">
      <kbd class="kbd">←</kbd>
      <kbd class="kbd">→</kbd>
      <span>điều hướng</span>
    </span>
    <span class="key-hint">
      <kbd class="kbd">Space</kbd>
      <span>tự động</span>
    </span>
  </div>

  <!-- Swipe Indicator -->
  <div class="swipe-indicator" id="swipe-indicator">
    <span class="swipe-arrow">⟵</span>
    <span>Vuốt để chuyển</span>
    <span class="swipe-arrow">⟶</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="controls-inner">
      <button class="ctrl-btn" id="btn-prev" type="button" aria-label="Trước">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="dots" id="dots"></div>
      <button class="ctrl-btn ctrl-btn--play" id="btn-playpause" type="button" aria-label="Tạm dừng">⏸</button>
      <button class="ctrl-btn" id="btn-next" type="button" aria-label="Tiếp">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Admin Button -->
  <a href="admin.html" class="admin-float-btn" aria-label="Quản trị viên">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path fill="currentColor" d="M12 17a2 2 0 0 0 2-2 2 2 0 0 0-2-2 2 2 0 0 0-2 2 2 2 0 0 0 2 2m6-9h-1V6a5 5 0 0 0-10 0v2H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2m-6-6a3 3 0 0 1 3 3v2H9V5a3 3 0 0 1 3-3Z"/>
    </svg>
  </a>

  <script src="db.js"></script>
  <script src="journey.js"></script>
</body>

</html>
